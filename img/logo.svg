<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Book -->
  <path d="M55 175 V80 C80 70, 100 80, 110 95 V180 C90 165, 75 165, 55 175Z"
        stroke="#0F172A" stroke-width="4" fill="none"/>

  <path d="M165 175 V80 C140 70, 120 80, 110 95 V180 C130 165, 145 165, 165 175Z"
        stroke="#0F172A" stroke-width="4" fill="none"/>

  <line x1="110" y1="92" x2="110" y2="180" stroke="#16A34A" stroke-width="3"/>

  <!-- Radar base -->
  <circle cx="110" cy="70" r="4" fill="#16A34A"/>

  <!-- rotating sweep -->
  <path d="M110 70 L110 10"
        stroke="#16A34A"
        stroke-width="2"
        opacity="0.8">
    
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 110 70"
      to="360 110 70"
      dur="2.5s"
      repeatCount="indefinite"/>
  </path>

  <!-- radar rings -->
  <circle cx="110" cy="70" r="20" stroke="#16A34A" stroke-width="2"/>
  <circle cx="110" cy="70" r="40" stroke="#16A34A" stroke-width="1.5" opacity="0.5"/>
  <circle cx="110" cy="70" r="60" stroke="#16A34A" stroke-width="1" opacity="0.25"/>

</svg>